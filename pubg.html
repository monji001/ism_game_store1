<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUBG Mobile UC | ISM STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00f7ff;
            --pubg-gold: #ffc107;
            --bg-dark: #07080f;
            --card-bg: rgba(20, 25, 40, 0.7);
        }

        /* ===== GLOBAL ===== */
        body {
            margin: 0; padding: 0;
            font-family: 'Poppins', sans-serif;
            background: var(--bg-dark);
            color: white; overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 10%, rgba(0, 247, 255, 0.05) 0%, transparent 50%);
        }

        .container { width: 90%; max-width: 1000px; margin: auto; }

        /* ===== NAVIGATION (متناسق مع بقية الصفحات) ===== */
        nav {
            position: fixed; top: 0; width: 100%;
            background: rgba(7, 8, 15, 0.85);
            backdrop-filter: blur(15px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; z-index: 1000; box-sizing: border-box;
            border-bottom: 1px solid rgba(0, 247, 255, 0.1);
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            color: var(--primary); font-weight: bold; font-size: 1.2rem;
            text-decoration: none;
        }

        .btn-home {
            color: #fff; text-decoration: none; font-size: 13px;
            border: 1px solid var(--primary); padding: 8px 18px;
            border-radius: 20px; transition: 0.3s;
        }

        .btn-home:hover { background: var(--primary); color: #000; box-shadow: 0 0 15px var(--primary); }

        /* ===== HEADER ===== */
        .header { padding: 140px 20px 40px; text-align: center; }
        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(24px, 5vw, 45px);
            color: #fff; text-shadow: 0 0 20px rgba(0, 247, 255, 0.3);
            margin-bottom: 15px;
        }

        .notice {
            background: rgba(255, 193, 7, 0.1);
            padding: 15px; border-radius: 12px;
            width: 90%; max-width: 500px; margin: 0 auto 40px;
            color: var(--pubg-gold);
            border: 1px solid rgba(255, 193, 7, 0.3);
            font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        /* ===== GRID & CARDS ===== */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px; padding-bottom: 80px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 35px 20px; border-radius: 20px;
            text-align: center; transition: 0.4s;
            position: relative;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(0, 247, 255, 0.15);
        }

        .card h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 22px; margin-bottom: 5px; color: #fff;
        }

        .price {
            font-size: 26px; color: var(--primary);
            font-weight: 700; margin-bottom: 25px;
            font-family: 'Orbitron', sans-serif;
        }

        .btn-buy {
            background: transparent; border: 2px solid var(--primary);
            color: var(--primary); padding: 10px 25px; border-radius: 30px;
            font-weight: bold; cursor: pointer; transition: 0.3s;
            width: 90%; text-transform: uppercase;
        }

        .card:hover .btn-buy { background: var(--primary); color: #000; }

        /* ===== FOOTER ===== */
        footer {
            padding: 40px; background: #030408; text-align: center;
            border-top: 1px solid rgba(255,255,255,0.05); color: #555;
        }

        /* ===== MESSENGER ===== */
        .messenger {
            position: fixed; bottom: 30px; right: 30px;
            background: #0084ff; width: 60px; height: 60px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; box-shadow: 0 10px 25px rgba(0, 132, 255, 0.4);
            transition: 0.4s; z-index: 2000;
        }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="logo">ISM STORE</a>
    <a href="index.html" class="btn-home">BACK HOME</a>
</nav>

<section class="header">
    <div class="container">
        <h1>PUBG Mobile UC Global</h1>
        <div class="notice">
            <span>⚠️</span> Top-Up is done using your PUBG Player ID
        </div>
    </div>
</section>

<div class="container">
    <div class="grid">
        <div class="card">
            <h3>60 UC</h3>
            <div class="price">5 DT</div>
            <button class="btn-buy" onclick="order('60 UC')">Order Now</button>
        </div>

        <div class="card">
            <h3>325 UC</h3>
            <div class="price">18 DT</div>
            <button class="btn-buy" onclick="order('325 UC')">Order Now</button>
        </div>

        <div class="card">
            <div style="position:absolute; top:10px; right:10px; background:var(--pubg-gold); color:#000; font-size:9px; padding:2px 8px; border-radius:5px; font-weight:bold;">POPULAR</div>
            <h3>660 UC</h3>
            <div class="price">35 DT</div>
            <button class="btn-buy" onclick="order('660 UC')">Order Now</button>
        </div>

        <div class="card">
            <h3>1800 UC</h3>
            <div class="price">88 DT</div>
            <button class="btn-buy" onclick="order('1800 UC')">Order Now</button>
        </div>

        <div class="card">
            <h3>3850 UC</h3>
            <div class="price">175 DT</div>
            <button class="btn-buy" onclick="order('3850 UC')">Order Now</button>
        </div>

        <div class="card" style="border-color: var(--pubg-gold);">
            <div style="position:absolute; top:10px; right:10px; background:var(--pubg-gold); color:#000; font-size:9px; padding:2px 8px; border-radius:5px; font-weight:bold;">ELITE</div>
            <h3>8100 UC</h3>
            <div class="price">333 DT</div>
            <button class="btn-buy" onclick="order('8100 UC')">Order Now</button>
        </div>
    </div>
</div>

<footer>
    <p>© 2026 ISM Game Store — Winner Winner Chicken Dinner!</p>
</footer>

<a class="messenger" href="https://m.me/61555974173704" target="_blank">
    <svg width="30" height="30" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.477 2 2 6.145 2 11.258c0 2.908 1.462 5.5 3.746 7.225V22l3.356-1.843c.917.254 1.887.393 2.898.393 5.523 0 10-4.146 10-9.258S17.523 2 12 2zm1.293 12.303l-2.586-2.754-5.04 2.754 5.546-5.89 2.586 2.754 5.04-2.754-5.546 5.89z"/></svg>
</a>

<script>
    function order(pack) {
        let message = encodeURIComponent(
            "مرحباً ISM Store\nأود طلب باقة شدات ببجي:\nالكمية: " + pack + "\nرقم الآيدي (ID): "
        );
        window.open("https://m.me/61555974173704?text=" + message, "_blank");
    }
</script>

</body>
</html>
