<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Accounts | ISM STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #e50914; /* لون نتفليكس الرسمي */
            --cyan: #00f7ff;
            --bg-dark: #07080f;
            --card-bg: rgba(20, 25, 40, 0.7);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Poppins', sans-serif;
            background: var(--bg-dark);
            color: white; overflow-x: hidden;
            background-image: radial-gradient(circle at 10% 10%, rgba(229, 9, 20, 0.1) 0%, transparent 40%);
        }

        .container { width: 90%; max-width: 1000px; margin: auto; }

        /* ===== NAVIGATION ===== */
        nav {
            position: fixed; top: 0; width: 100%;
            background: rgba(7, 8, 15, 0.85);
            backdrop-filter: blur(15px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; z-index: 1000; box-sizing: border-box;
            border-bottom: 1px solid rgba(229, 9, 20, 0.3);
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            color: var(--cyan); font-weight: bold; font-size: 1.2rem;
            text-decoration: none;
        }

        .btn-home {
            color: #fff; text-decoration: none; font-size: 13px;
            border: 1px solid var(--primary); padding: 8px 18px;
            border-radius: 20px; transition: 0.3s;
        }

        .btn-home:hover { background: var(--primary); box-shadow: 0 0 15px var(--primary); }

        /* ===== HEADER ===== */
        .header { padding: 140px 20px 60px; text-align: center; }
        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(24px, 6vw, 45px);
            color: var(--primary); text-shadow: 0 0 20px rgba(229, 9, 20, 0.5);
        }
        .header p { color: #888; letter-spacing: 1px; margin-top: 10px; }

        /* ===== GRID & CARDS ===== */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px; padding-bottom: 80px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 45px 25px; border-radius: 24px;
            text-align: center; transition: 0.4s;
            position: relative;
        }

        .card:hover {
            transform: translateY(-12px);
            border-color: var(--primary);
            box-shadow: 0 15px 40px rgba(229, 9, 20, 0.2);
            background: rgba(25, 30, 50, 0.9);
        }

        .card-icon {
            font-size: 40px; margin-bottom: 20px;
            display: block; filter: drop-shadow(0 0 10px var(--primary));
        }

        .card h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px; margin-bottom: 10px; color: #fff;
        }

        .price {
            font-size: 32px; color: var(--primary);
            font-weight: 700; margin-bottom: 30px;
            font-family: 'Orbitron', sans-serif;
        }

        .btn-order {
            background: var(--primary); border: none;
            color: #fff; padding: 12px 35px; border-radius: 30px;
            font-weight: bold; cursor: pointer; transition: 0.3s;
            width: 100%; text-transform: uppercase; letter-spacing: 1px;
        }

        .btn-order:hover {
            background: #fff; color: var(--primary);
            box-shadow: 0 5px 20px rgba(255, 255, 255, 0.2);
        }

        /* ===== FOOTER ===== */
        footer {
            padding: 40px; background: #030408; text-align: center;
            border-top: 1px solid rgba(229, 9, 20, 0.2); color: #555;
        }

        /* ===== MESSENGER ===== */
        .messenger {
            position: fixed; bottom: 30px; right: 30px;
            background: #0084ff; width: 60px; height: 60px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; box-shadow: 0 10px 25px rgba(0, 132, 255, 0.4);
            transition: 0.4s; z-index: 2000;
        }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="logo">ISM STORE</a>
    <div style="display: flex; gap: 15px; align-items: center;">
        <span onclick="toggleLang()" style="cursor:pointer; font-size: 12px; color: var(--cyan);">AR | EN</span>
        <a href="index.html" class="btn-home">HOME</a>
    </div>
</nav>

<section class="header">
    <div class="container">
        <h1 id="pageTitle">Netflix Premium 🎁</h1>
        <p id="subTitle">Ultra HD 4K • Anti-Screen Lock • High Stability</p>
    </div>
</section>

<div class="container">
    <div class="grid">
        <div class="card">
            <span class="card-icon">👤</span>
            <h3 id="profileTitle">1 Profile (Shared)</h3>
            <div class="price">15 DT</div>
            <button class="btn-order" onclick="order('1 Profile')" id="orderBtn1">Order Now</button>
        </div>

        <div class="card" style="border-color: var(--primary);">
            <div style="position:absolute; top:12px; right:12px; background:var(--primary); color:#fff; font-size:9px; padding:3px 10px; border-radius:5px; font-weight:bold;">BEST VALUE</div>
            <span class="card-icon">📺</span>
            <h3 id="fullTitle">Full Account (5 Profiles)</h3>
            <div class="price">40 DT</div>
            <button class="btn-order" onclick="order('Full Account')" id="orderBtn2">Order Now</button>
        </div>
    </div>
</div>

<footer>
    <p>© 2026 ISM Game Store — Enjoy your movies!</p>
</footer>

<a class="messenger" href="https://m.me/61555974173704" target="_blank">
    <svg width="30" height="30" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.477 2 2 6.145 2 11.258c0 2.908 1.462 5.5 3.746 7.225V22l3.356-1.843c.917.254 1.887.393 2.898.393 5.523 0 10-4.146 10-9.258S17.523 2 12 2zm1.293 12.303l-2.586-2.754-5.04 2.754 5.546-5.89 2.586 2.754 5.04-2.754-5.546 5.89z"/></svg>
</a>

<script>
    function order(type) {
        let msg = encodeURIComponent("مرحباً ISM Store، أريد طلب اشتراك نتفليكس: " + type);
        window.open("https://m.me/61555974173704?text=" + msg, "_blank");
    }

    let lang = "en";
    function toggleLang() {
        const pTitle = document.getElementById("pageTitle");
        const sub = document.getElementById("subTitle");
        const prof = document.getElementById("profileTitle");
        const full = document.getElementById("fullTitle");
        const b1 = document.getElementById("orderBtn1");
        const b2 = document.getElementById("orderBtn2");

        if(lang === "en") {
            pTitle.innerText = "حسابات نتفليكس 🎁";
            sub.innerText = "دقة 4K • حماية من الحظر • جودة مستقرة";
            prof.innerText = "بروفايل واحد (مشترك)";
            full.innerText = "حساب كامل (5 بروفايلات)";
            b1.innerText = "اطلب الآن";
            b2.innerText = "اطلب الآن";
            lang = "ar";
        } else {
            pTitle.innerText = "Netflix Premium 🎁";
            sub.innerText = "Ultra HD 4K • Anti-Screen Lock • High Stability";
            prof.innerText = "1 Profile (Shared)";
            full.innerText = "Full Account (5 Profiles)";
            b1.innerText = "Order Now";
            b2.innerText = "Order Now";
            lang = "en";
        }
    }
</script>

</body>
</html>
