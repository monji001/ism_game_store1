
<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internet Packages | ISM STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00f7ff;
            --ooredoo: #ed1c24;
            --orange: #ff7900;
            --tt: #7b4cff;
            --bg-dark: #050713;
            --card-bg: rgba(10, 16, 32, 0.82);
            --gold: #ffd166;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 0;
            font-family: 'Poppins', sans-serif;
            background: var(--bg-dark);
            color: white; overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -2;
            background:
                radial-gradient(circle at 14% 18%, rgba(237, 28, 36, 0.2), transparent 28%),
                radial-gradient(circle at 84% 16%, rgba(255, 121, 0, 0.2), transparent 28%),
                radial-gradient(circle at 52% 86%, rgba(123, 76, 255, 0.2), transparent 32%),
                linear-gradient(145deg, #050713 0%, #081329 52%, #03040a 100%);
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            background:
                repeating-linear-gradient(90deg, rgba(255,255,255,0.03) 0 1px, transparent 1px 96px),
                repeating-linear-gradient(0deg, rgba(255,255,255,0.022) 0 1px, transparent 1px 96px);
            mask-image: linear-gradient(to bottom, black, transparent 82%);
        }

        .container { width: min(92%, 1200px); margin: auto; }

        nav {
            position: fixed; top: 0; left: 0; right: 0; width: 100%;
            background: rgba(5, 7, 19, 0.86);
            backdrop-filter: blur(15px);
            display: flex; justify-content: space-between; align-items: center;
            gap: 18px;
            padding: 15px 5%; z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 18px 42px rgba(0, 0, 0, 0.22);
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            color: white; font-weight: bold; font-size: 1.12rem;
            text-decoration: none;
            text-shadow: 0 0 16px rgba(0, 247, 255, 0.55);
            white-space: nowrap;
        }

        .btn-home {
            color: #fff; text-decoration: none; font-size: 13px;
            border: 1px solid rgba(0, 247, 255, 0.28); padding: 8px 18px;
            border-radius: 8px; transition: 0.3s;
            background: rgba(255, 255, 255, 0.04);
            white-space: nowrap;
        }

        .btn-home:hover { background: var(--primary); color: #031018; box-shadow: 0 0 18px rgba(0, 247, 255, 0.45); }

        .header { padding: 138px 20px 54px; text-align: center; position: relative; overflow: hidden; }

        .header::before {
            content: "DATA";
            position: absolute;
            left: 50%;
            top: 76px;
            transform: translateX(-50%);
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(76px, 17vw, 176px);
            font-weight: 700;
            color: rgba(255, 255, 255, 0.035);
            pointer-events: none;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 14px;
            padding: 8px 13px;
            border-radius: 999px;
            background: rgba(0, 247, 255, 0.09);
            border: 1px solid rgba(0, 247, 255, 0.26);
            color: #bffcff;
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
        }

        .header h1 {
            position: relative;
            margin: 0;
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(30px, 5vw, 52px);
            color: #fff; text-shadow: 0 0 24px rgba(0, 247, 255, 0.54);
        }

        .header p {
            position: relative;
            color: #aeb8d0;
            font-size: 15px;
            line-height: 1.6;
            margin: 16px auto 0;
            max-width: 620px;
        }

        .section { margin-bottom: 48px; }

        .section-title {
            display: flex; align-items: center; gap: 15px;
            margin: 46px 0 18px; font-family: 'Orbitron', sans-serif;
        }

        .section-title h2 {
            display: inline-flex;
            align-items: center;
            margin: 0;
            padding: 9px 13px;
            border-radius: 8px;
            background: rgba(255,255,255,0.055);
            border: 1px solid rgba(255,255,255,0.09);
            font-size: 1.05rem;
            letter-spacing: 1px;
        }

        .ooredoo-title h2 { color: var(--ooredoo); }
        .orange-title h2 { color: var(--orange); }
        .tt-title h2 { color: var(--tt); }

        .line { flex-grow: 1; height: 1px; background: linear-gradient(90deg, currentColor, transparent); opacity: 0.42; }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 18px;
        }

        .card {
            min-height: 220px;
            background:
                linear-gradient(160deg, var(--card-bg), rgba(4, 6, 15, 0.94)),
                linear-gradient(140deg, rgba(0,247,255,0.08), rgba(255,255,255,0.04));
            border-radius: 8px; padding: 22px;
            text-align: left; border: 1px solid rgba(255, 255, 255, 0.09);
            transition: 0.28s ease;
            position: relative; overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 20px 44px rgba(0, 0, 0, 0.28);
        }

        .card::before {
            content: "";
            position: absolute;
            inset: 0 0 auto 0;
            height: 5px;
            background: var(--primary);
        }

        .card::after {
            content: "GB";
            position: absolute;
            right: 14px;
            bottom: -20px;
            font-family: 'Orbitron', sans-serif;
            font-size: 88px;
            line-height: 1;
            color: rgba(255, 255, 255, 0.04);
            pointer-events: none;
        }

        .card:hover {
            transform: translateY(-7px);
            box-shadow: 0 28px 58px rgba(0, 0, 0, 0.42);
        }

        .card-head, .card-bottom {
            position: relative;
            z-index: 1;
        }

        .operator-tag {
            display: inline-flex;
            margin-bottom: 16px;
            padding: 7px 10px;
            border-radius: 999px;
            color: white;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .card h3 {
            font-size: 34px;
            line-height: 1;
            margin: 0;
            font-family: 'Orbitron', sans-serif;
            color: white;
        }

        .note {
            display: block;
            margin-top: 10px;
            color: #aeb8d0;
            font-size: 13px;
        }

        .price {
            display: block;
            font-size: 29px;
            line-height: 1;
            margin: 27px 0 17px;
            color: var(--gold);
            font-weight: bold;
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 18px rgba(255, 209, 102, 0.28);
        }

        .btn-order {
            width: 100%; padding: 13px 14px; border-radius: 8px;
            border: none; font-weight: bold; cursor: pointer;
            transition: 0.3s; text-transform: uppercase; font-size: 13px;
            color: white;
        }

        .ooredoo-card::before,
        .ooredoo-btn,
        .ooredoo-card .operator-tag { background: var(--ooredoo); }
        .ooredoo-card:hover { border-color: rgba(237, 28, 36, 0.42); box-shadow: 0 28px 58px rgba(0, 0, 0, 0.42), 0 0 22px rgba(237, 28, 36, 0.2); }

        .orange-card::before,
        .orange-btn,
        .orange-card .operator-tag { background: var(--orange); }
        .orange-card:hover { border-color: rgba(255, 121, 0, 0.42); box-shadow: 0 28px 58px rgba(0, 0, 0, 0.42), 0 0 22px rgba(255, 121, 0, 0.2); }

        .tt-card::before,
        .tt-btn,
        .tt-card .operator-tag { background: var(--tt); }
        .tt-card:hover { border-color: rgba(123, 76, 255, 0.42); box-shadow: 0 28px 58px rgba(0, 0, 0, 0.42), 0 0 22px rgba(123, 76, 255, 0.22); }

        .btn-order:hover { transform: translateY(-2px); filter: brightness(1.12); }

        footer {
            padding: 40px 20px;
            text-align: center;
            color: #7f89a0;
            font-size: 14px;
            background: rgba(3, 4, 8, 0.78);
            border-top: 1px solid rgba(255,255,255,0.07);
        }

        .messenger {
            position: fixed; bottom: 30px; right: 30px;
            background: linear-gradient(135deg, #0084ff, #00f7ff); width: 60px; height: 60px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; box-shadow: 0 10px 25px rgba(0, 132, 255, 0.4);
            transition: 0.4s; z-index: 2000;
        }

        .messenger:hover {
            transform: scale(1.12);
            box-shadow: 0 12px 32px rgba(0, 132, 255, 0.58);
        }

        @media (max-width: 920px) {
            .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        }

        @media (max-width: 620px) {
            nav {
                position: relative;
                padding: 14px 18px;
                align-items: flex-start;
            }

            .header { padding: 54px 18px 34px; }
            .header::before { top: 8px; }
            .grid { grid-template-columns: 1fr; }
            .section { margin-bottom: 36px; }
            .card { min-height: 204px; padding: 22px; }
            .messenger {
                width: 54px; height: 54px;
                right: 18px; bottom: 18px;
            }
        }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="logo">ISM STORE</a>
    <a href="index.html" class="btn-home">BACK HOME</a>
</nav>

<section class="header">
    <div class="container">
        <div class="hero-badge">Tunisian Mobile Data</div>
        <h1>📶 Internet SIM Packages</h1>
        <p>شحن فوري لجميع الخطوط التونسية: Ooredoo, Orange, and Tunisie Telecom.</p>
    </div>
</section>

<div class="container">
    
    <div class="section">
        <div class="section-title ooredoo-title">
            <h2>Ooredoo</h2>
            <div class="line"></div>
        </div>
        <div class="grid">
            <script>
                const ooredooPlans = [
                    {go: '25 Go', price: '30 DT'}, {go: '30 Go', price: '35 DT'},
                    {go: '42 Go', price: '45 DT'}, {go: '55 Go', price: '55 DT'},
                    {go: '100 Go', price: '70 DT'}, {go: '200 Go', price: '100 DT'}
                ];
                ooredooPlans.forEach(plan => {
                    document.write(`
                        <div class="card ooredoo-card">
                            <div class="card-head">
                                <span class="operator-tag">Ooredoo</span>
                                <h3>${plan.go}</h3>
                                <span class="note">Instant mobile data recharge</span>
                            </div>
                            <div class="card-bottom">
                                <div class="price">${plan.price}</div>
                                <button class="btn-order ooredoo-btn" onclick="order('Ooredoo ${plan.go}', '${plan.price}')">Order Now</button>
                            </div>
                        </div>
                    `);
                });
            </script>
        </div>
    </div>

    <div class="section">
        <div class="section-title orange-title">
            <h2>Orange</h2>
            <div class="line"></div>
        </div>
        <div class="grid">
            <script>
                const orangePlans = [
                    {go: '25 Go', price: '30 DT'}, {go: '30 Go', price: '35 DT'},
                    {go: '42 Go', price: '45 DT'}, {go: '55 Go', price: '55 DT'},
                    {go: '100 Go', price: '70 DT'}
                ];
                orangePlans.forEach(plan => {
                    document.write(`
                        <div class="card orange-card">
                            <div class="card-head">
                                <span class="operator-tag">Orange</span>
                                <h3>${plan.go}</h3>
                                <span class="note">Instant mobile data recharge</span>
                            </div>
                            <div class="card-bottom">
                                <div class="price">${plan.price}</div>
                                <button class="btn-order orange-btn" onclick="order('Orange ${plan.go}', '${plan.price}')">Order Now</button>
                            </div>
                        </div>
                    `);
                });
            </script>
        </div>
    </div>

    <div class="section">
        <div class="section-title tt-title">
            <h2>Tunisie Telecom (TT)</h2>
            <div class="line"></div>
        </div>
        <div class="grid">
            <script>
                const ttPlans = [
                    {go: '25 Go', price: '30 DT'},
                    {go: '30 Go', price: '35 DT'},
                    {go: '42 Go', price: '45 DT'},
                    {go: '55 Go', price: '55 DT'},
                    {go: '100 Go', price: '70 DT'},
                    {go: '200 Go', price: '100 DT'}
                ];
                ttPlans.forEach(plan => {
                    document.write(`
                        <div class="card tt-card">
                            <div class="card-head">
                                <span class="operator-tag">Tunisie Telecom</span>
                                <h3>${plan.go}</h3>
                                <span class="note">Instant mobile data recharge</span>
                            </div>
                            <div class="card-bottom">
                                <div class="price">${plan.price}</div>
                                <button class="btn-order tt-btn" onclick="order('Tunisie Telecom ${plan.go}', '${plan.price}')">Order Now</button>
                            </div>
                        </div>
                    `);
                });
            </script>
        </div>
    </div>

</div>

<footer>
    <p>© 2026 ISM Game Store — All Rights Reserved</p>
</footer>

<a class="messenger" href="https://m.me/61555974173704" target="_blank">
    <svg width="30" height="30" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.477 2 2 6.145 2 11.258c0 2.908 1.462 5.5 3.746 7.225V22l3.356-1.843c.917.254 1.887.393 2.898.393 5.523 0 10-4.146 10-9.258S17.523 2 12 2zm1.293 12.303l-2.586-2.754-5.04 2.754 5.546-5.89 2.586 2.754 5.04-2.754-5.546 5.89z"/></svg>
</a>

<script>
function order(product, price) {
    let msg = encodeURIComponent(
`Hello ISM STORE

I'd like to place the following order:

━━━━━━━━━━━━━━━━━━
ORDER INFORMATION

Product:
${product}

Price:
${price}

━━━━━━━━━━━━━━━━━━

Please send me the payment details and I'll complete my order right away.

Thank you!`
    );

    window.open("https://m.me/61555974173704?text=" + msg, "_blank");
}
</script>

</body>
</html>
